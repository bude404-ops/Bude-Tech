<!DOCTYPE html>
<html>
<head>
    <title>ANCESTOR CORE | VOLTANN</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #33ff33; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 40px;
            background-image: linear-gradient(rgba(0, 20, 0, 0.5) 50%, rgba(0, 0, 0, 0.5) 50%);
            background-size: 100% 4px; /* Scanline effect */
        }
        h1 { border-bottom: 2px solid #33ff33; display: inline-block; text-transform: uppercase; }
        .data-box { border: 1px solid #33ff33; padding: 20px; margin-top: 20px; background: #001100; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>[ ANC-CORE // STATUS: NOMINAL ]</h1>
    <div class="data-box">
        <h3>ACTIVE MISSIONS:</h3>
        <pre id="content">Syncing with Ancestor Bank...</pre>
    </div>
    <script>
        fetch('missions.md')
            .then(response => response.text())
            .then(data => { document.getElementById('content').innerText = data; });
    </script>
</body>
</html>
