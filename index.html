<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BudE STC Core</title>

<style>

body{
margin:0;
background:#05070a;
color:#e8f1ff;
font-family:Arial,sans-serif;
}

header{
text-align:center;
padding:25px;
border-bottom:1px solid #263747;
}

h1{
margin:0;
}

.status{
color:#4cff88;
margin-top:10px;
}

.container{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:15px;

padding:15px;

}


.card{

background:#0d141c;

border:1px solid #263747;

border-radius:12px;

padding:15px;

}


.card h2{

margin-top:0;

}


.agent{

background:#111c26;

padding:10px;

margin-bottom:8px;

border-radius:8px;

}


.online{

color:#4cff88;

}


.console{

background:#000;

padding:12px;

font-family:monospace;

min-height:100px;

}



</style>

</head>


<body>


<header>

<h1>
BudE STC Core
</h1>

<div>
Genesis Alpha 1.0
</div>

<div class="status">
● COMMAND BRIDGE ONLINE
</div>

</header>



<div class="container">



<div class="card">

<h2>Core Status</h2>

<div id="system">
Loading...
</div>

</div>




<div class="card">

<h2>Mission</h2>

<div id="mission">
Loading...
</div>

</div>




<div class="card">

<h2>Agent Network</h2>

<div id="agents">
Loading...
</div>

</div>




<div class="card">

<h2>Project Forge</h2>

<div id="projects">
Loading...
</div>

</div>




<div class="card">

<h2>Knowledge Vault</h2>

<div id="knowledge">
Loading...
</div>

</div>




<div class="card">

<h2>Core Metrics</h2>

<div id="metrics">
Loading...
</div>

</div>




<div class="card">

<h2>Evolution</h2>

<div id="evolution">
Loading...
</div>

</div>




<div class="card">

<h2>System Console</h2>

<div class="console" id="console">

Awaiting Core...

</div>

</div>



</div>




<script>


async function loadCore(){


try{


const response =
await fetch("core.json");


const core =
await response.json();



document.getElementById("system").innerHTML=`

<p>
Name:
${core.system.name}
</p>

<p>
Version:
${core.system.version}
</p>

<p>
Status:
<span class="online">
${core.system.status}
</span>
</p>

`;





document.getElementById("mission").innerHTML=`

<p>
${core.mission.id}
</p>

<p>
${core.mission.title}
</p>

<p>
${core.mission.status}
</p>

`;






let agentHTML="";


Object.keys(core.agents)
.forEach(agent=>{


agentHTML+=`

<div class="agent">

<b>
${agent}
</b>

<br>

${core.agents[agent].role}

<br>

<span class="online">
${core.agents[agent].status}
</span>


</div>

`;

});


document.getElementById("agents").innerHTML=
agentHTML;






let projects="";


core.project_forge.active_projects
.forEach(project=>{


projects+=`

<div class="agent">

<b>
${project.name}
</b>

<br>

Phase:
${project.phase}

<br>

Status:
${project.status}

</div>

`;

});


document.getElementById("projects").innerHTML=
projects || "No active projects";





document.getElementById("knowledge").innerHTML=`

Concepts:
${core.knowledge_vault.concepts.length}

<br>

Research:
${core.knowledge_vault.research.length}

<br>

Designs:
${core.knowledge_vault.designs.length}

`;





document.getElementById("metrics").innerHTML=`

Health:
${core.core_metrics.health}%

<br>

Agents:
${core.core_metrics.total_agents}

<br>

Projects:
${core.core_metrics.total_projects}

<br>

Knowledge:
${core.core_metrics.total_knowledge}

`;





document.getElementById("evolution").innerHTML=`

Current:
${core.evolution.current_phase}

<br><br>

Next:
${core.evolution.next_phase}

`;





document.getElementById("console").innerHTML=`

> Memory Crystal connected<br>

> Agents detected:
${Object.keys(core.agents).length}

<br>

> Core status:
${core.system.status}

<br>

> Awaiting Commander

`;



}

catch(error){


document.getElementById("console").innerHTML=

"> ERROR: core.json unavailable";


}


}



loadCore();


</script>


</body>

</html>
