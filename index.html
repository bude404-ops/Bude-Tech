<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudE OS Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>BudE OS v0.3</h1>
            <div class="status" id="system-status">Checking...</div>
        </header>

        <div class="auto-work-bar">
            <button id="auto-work-btn" class="auto-work-btn" onclick="toggleAutoWork()">
                AUTO WORK: OFF
            </button>
            <div class="auto-work-status" id="auto-work-status">
                Tap to start autonomous evolution
            </div>
        </div>

        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('chat')">Chat</button>
            <button class="tab-btn" onclick="switchTab('evolution')">Evolution Log</button>
        </nav>

        <main>
            <section id="chat" class="tab-content active">
                <div class="chat-box" id="chat-box"></div>
                <div class="chat-input">
                    <input type="text" id="chat-message" placeholder="Message BudE..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </section>

            <section id="evolution" class="tab-content">
                <div class="panel">
                    <h2>Evolution Story</h2>
                    <div id="evolution-display">Loading...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
