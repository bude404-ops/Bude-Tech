<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
BudE STC Core
</title>


<style>

body{

background:#05070a;

color:#e6f1ff;

font-family:Arial,sans-serif;

margin:0;

}


header{

text-align:center;

padding:25px;

border-bottom:1px solid #263747;

}


.status{

color:#4cff88;

}


.container{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:15px;

padding:15px;

}



.card{

background:#101821;

border:1px solid #263747;

border-radius:12px;

padding:15px;

}



.card h2{

margin-top:0;

}



.item{

background:#18232e;

padding:10px;

margin:8px 0;

border-radius:8px;

}



.online{

color:#4cff88;

}


</style>


</head>



<body>


<header>

<h1>
BudE STC Core
</h1>


<p>
Genesis Beta 1.7
</p>


<div class="status">

● COMMAND BRIDGE ONLINE

</div>


</header>




<div class="container">



<div class="card">

<h2>
Core Status
</h2>

<div id="core">

Loading...

</div>

</div>





<div class="card">

<h2>
Agent Network
</h2>

<div id="agents">

Loading...

</div>

</div>





<div class="card">

<h2>
STC Modules
</h2>

<div id="modules">

Loading...

</div>

</div>





<div class="card">

<h2>
Creation Pipeline
</h2>


<div>

Idea

<br>
↓

<br>

Research

<br>
↓

<br>

Design

<br>
↓

<br>

Simulation

<br>
↓

<br>

Validation

<br>
↓

<br>

Build

</div>


</div>





<div class="card">

<h2>
Knowledge Graph
</h2>


<div id="knowledge">

Loading...

</div>


</div>





<div class="card">

<h2>
Project Forge
</h2>


<div id="projects">

Loading...

</div>


</div>





<div class="card">

<h2>
Evolution
</h2>


<div id="evolution">

Loading...

</div>


</div>




</div>





<script>


async function loadCore(){


try{


let response =
await fetch("core.json");


let core =
await response.json();





document.getElementById("core")
.innerHTML = `


Name:
${core.system.name}


<br><br>


Version:
${core.system.version}


<br><br>


Status:

<span class="online">

${core.system.status}

</span>


<br><br>


Health:

${core.core_metrics.health}%

`;







let agents="";


Object.keys(core.agents)
.forEach(agent=>{


agents += `


<div class="item">


<b>
${agent}
</b>


<br>


${core.agents[agent].role}


<br>


Status:

${core.agents[agent].status}


</div>


`;


});


document.getElementById("agents")
.innerHTML = agents;








let modules="";


Object.keys(core.modules)
.forEach(module=>{


modules += `


<div class="item">


<b>

${core.modules[module].name}

</b>


<br>


Status:

${core.modules[module].status}


</div>


`;


});


document.getElementById("modules")
.innerHTML = modules;









document.getElementById("knowledge")
.innerHTML = `


Knowledge Nodes:

${core.knowledge_graph.nodes.length}


<br><br>


Connections:

${core.knowledge_graph.connections.length}


`;








let projects="";


core.project_forge.active_projects
.forEach(project=>{


projects += `


<div class="item">


<b>

${project.name}

</b>


<br>


Phase:

${project.phase}


<br>


Status:

${project.status}


</div>


`;


});


document.getElementById("projects")
.innerHTML =
projects;








document.getElementById("evolution")
.innerHTML = `


Current:

${core.evolution.current_phase}


<br><br>


Next:

${core.evolution.next_phase}


`;



}

catch(error){


document.body.innerHTML =

"CORE CONNECTION ERROR";


}



}



loadCore();



</script>


</body>

</html>
