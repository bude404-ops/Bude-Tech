name: Bude-Tech Autonomy Loop
on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Execute Brain
        run: python system/controller.py
      - name: Commit Status
        run: |
          git config user.name "Bude-Tech-Agent"
          git config user.email "agent@bude.tech"
          git add dashboard/status.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update system status" && git push)
