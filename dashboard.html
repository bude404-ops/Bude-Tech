<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudE Tech Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: #e6e6e6;
}

/* HEADER */
.header {
    padding: 15px;
    background: #151923;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
}

/* CHAT AREA */
.chat {
    height: 40vh;
    overflow-y: auto;
    padding: 10px;
    border-bottom: 1px solid #222;
}

.msg {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #2a6df4;
    margin-left: auto;
}

.ai {
    background: #2a2f3a;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 10px;
    background: #151923;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    margin-left: 8px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2a6df4;
    color: white;
}

/* PANELS */
.panel {
    padding: 10px;
    border-top: 1px solid #222;
}

.title {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 5px;
}

/* AUTO BUTTON */
.auto {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    background: #1f8b4c;
    border: none;
    color: white;
    margin-top: 10px;
    border-radius: 10px;
}

.auto.off {
    background: #b33a3a;
}
</style>
</head>

<body>

<div class="header">
BudE Tech Control Center
</div>

<!-- CHAT -->
<div id="chat" class="chat"></div>

<div class="input-area">
<input id="msg" placeholder="Talk to BudE Tech..." />
<button onclick="sendMsg()">Send</button>
</div>

<!-- AUTO MODE -->
<div class="panel">
<div class="title">AUTO MODE</div>
<button id="autoBtn" class="auto off" onclick="toggleAuto()">OFF</button>
</div>

<!-- TASKS -->
<div class="panel">
<div class="title">TASKS</div>
<div id="tasks">No data yet</div>
</div>

<!-- WORKERS -->
<div class="panel">
<div class="title">WORKERS</div>
<div id="workers">CEO, CTO, ENGINEER, QA, FINANCE</div>
</div>

<!-- LOGS -->
<div class="panel">
<div class="title">SYSTEM LOGS</div>
<div id="logs">Waiting...</div>
</div>

<script>
let auto = false;

function addMsg(text, cls) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function sendMsg() {
    let input = document.getElementById("msg");
    let text = input.value;
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    // Simulated AI response (connect to backend later)
    setTimeout(() => {
        addMsg("Task received: " + text, "ai");
    }, 500);
}

function toggleAuto() {
    auto = !auto;
    const btn = document.getElementById("autoBtn");

    if (auto) {
        btn.innerText = "ON";
        btn.classList.remove("off");
        addMsg("Auto Mode enabled", "ai");
    } else {
        btn.innerText = "OFF";
        btn.classList.add("off");
        addMsg("Auto Mode disabled", "ai");
    }
}

// Fake updater (will connect to brain.py later)
function updatePanels() {
    document.getElementById("tasks").innerText = "Waiting for backend...";
    document.getElementById("logs").innerText = "System initializing...";
}

setInterval(updatePanels, 3000);
updatePanels();
</script>

</body>
</html>
