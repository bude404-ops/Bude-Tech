<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudE Tech</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f1115;
    color: white;
}

.header {
    padding: 12px;
    background: #151923;
    text-align: center;
    font-weight: bold;
}

.chat {
    height: 40vh;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
}

.user { background: #2a6df4; }
.ai { background: #2a2f3a; }

.input {
    display: flex;
    padding: 10px;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    margin-left: 5px;
    padding: 10px;
}

.panel {
    padding: 10px;
    border-top: 1px solid #222;
}

.auto {
    width: 100%;
    padding: 15px;
    background: #1f8b4c;
    color: white;
    border: none;
}

.off {
    background: #b33a3a;
}
</style>
</head>

<body>

<div class="header">BudE Tech Control</div>

<div id="chat" class="chat"></div>

<div class="input">
<input id="msg" placeholder="Send task..." />
<button onclick="send()">Send</button>
</div>

<div class="panel">
<button id="autoBtn" class="auto off" onclick="toggle()">AUTO OFF</button>
</div>

<div class="panel" id="status">Loading...</div>

<script>
const API = "http://127.0.0.1:8000";

function add(text, cls) {
    let d = document.createElement("div");
    d.className = "msg " + cls;
    d.innerText = text;
    document.getElementById("chat").appendChild(d);
}

async function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    add(msg, "user");

    await fetch(`${API}/task/add/${encodeURIComponent(msg)}`);

    add("Task sent", "ai");
}

async function toggle() {
    let r = await fetch(`${API}/auto/toggle`, {method:"POST"});
    let j = await r.json();

    let btn = document.getElementById("autoBtn");

    if (j.auto) {
        btn.innerText = "AUTO ON";
        btn.classList.remove("off");
    } else {
        btn.innerText = "AUTO OFF";
        btn.classList.add("off");
    }
}

async function update() {
    let s = await fetch(`${API}/status`).then(r => r.json());

    document.getElementById("status").innerText =
        `Tasks: ${s.tasks} | Completed: ${s.completed} | Logs: ${s.logs}`;
}

setInterval(update, 3000);
update();
</script>

</body>
</html>
