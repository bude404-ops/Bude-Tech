<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bude-Tech Command Center</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
        .card { border: 1px solid #333; padding: 15px; margin-bottom: 10px; }
        input { background: #000; color: #00ff00; border: 1px solid #00ff00; width: 100%; padding: 10px; }
    </style>
</head>
<body>
    <h1>Bude-Tech Status</h1>
    <div id="status" class="card">Loading System Status...</div>
    
    <h2>System Command Input</h2>
    <input type="text" id="commandInput" placeholder="Enter command for Agent..." onkeydown="if(event.key==='Enter') sendCommand()">

    <script>
        // Poll status every 5 seconds
        async function updateStatus() {
            const res = await fetch('status.json');
            const data = await res.json();
            document.getElementById('status').innerText = `Iteration: ${data.iteration} | Status: ${data.state} | Last Action: ${data.last_action}`;
        }
        setInterval(updateStatus, 5000);

        async function sendCommand() {
            const cmd = document.getElementById('commandInput').value;
            alert("Command logged to input.json: " + cmd);
            // In a live environment, you would use a backend fetch to update the JSON file
        }
    </script>
</body>
</html>
