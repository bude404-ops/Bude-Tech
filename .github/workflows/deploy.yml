name: BudE STC Core Deployment

on:
  push:
    branches:
      - main

  workflow_dispatch:


permissions:

  contents: read

  pages: write

  id-token: write



jobs:

  deploy:

    runs-on: ubuntu-latest


    environment:

      name: github-pages

      url: ${{ steps.deployment.outputs.page_url }}



    steps:


      - name: Checkout STC Core

        uses: actions/checkout@v4



      - name: Setup Pages

        uses: actions/configure-pages@v5



      - name: Upload STC Core

        uses: actions/upload-pages-artifact@v3

        with:

          path: .



      - name: Deploy STC Core

        id: deployment

        uses: actions/deploy-pages@v4
