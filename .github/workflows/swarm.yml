name: BudE Real-World Integration Layer V21

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # =========================
      # 🧠 LOAD SYSTEM CORE STATE
      # =========================
      - name: Load Memory
        run: |
          if [ ! -f memory.json ]; then
            echo '{
              "apps": ["farm_dashboard", "inventory_system", "crm_tool"],
              "integrations": [],
              "api_links": [],
              "auth_enabled": false,
              "data_sources": []
            }' > memory.json
          fi

      # =========================
      # 📦 SETUP NODE & EXPRESS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          if [ ! -f package.json ]; then
            echo '{
              "name": "bude-integration-layer",
              "version": "21.0.0",
              "private": true,
              "dependencies": {
                "express": "^4.18.2"
              }
            }' > package.json
          fi
          npm install

      # =========================
      # 🔌 BUILD INTEGRATION MAP
      # =========================
      - name: Build Integration Map
        run: |
          node -e "
            const fs = require('fs');
            let memory = JSON.parse(fs.readFileSync('memory.json', 'utf8'));
            let integration_map = {};
            memory.apps.forEach(app => {
              integration_map[app] = {
                api: '/api/' + app,
                db: app + '_db',
                auth: 'enabled',
                external: ['rest', 'json', 'webhook']
              };
            });
            fs.writeFileSync('integration_map.json', JSON.stringify(integration_map, null, 2));
          "

      # =========================
      # 🧩 GENERATE API CONNECTORS (FIXED SAFE VERSION)
      # =========================
      - name: Generate API Connectors
        run: |
          mkdir -p integrations

          node -e "
            const fs = require('fs');
            let map = JSON.parse(fs.readFileSync('integration_map.json', 'utf8'));
            let port = 3000;

            Object.keys(map).forEach(app => {
              let dir = 'integrations/' + app;
              fs.mkdirSync(dir, { recursive: true });

              let apiCode = [
                'const express = require(\"express\");',
                'const app = express();',
                '',
                'app.use(express.json());',
                '',
                'app.get(\"/external-status\", (req, res) => {',
                '  res.json({ app: \"' + app + '\", status: \"connected\", sources: [\"rest\", \"json\", \"webhook\"] });',
                '});',
                '',
                'app.post(\"/sync\", (req, res) => {',
                '  res.json({ app: \"' + app + '\", synced: true, payload: req.body });',
                '});',
                '',
                'const PORT = process.env.PORT || ' + port + ';',
                'app.listen(PORT, () => console.log(\"Integration layer running for ' + app + ' on port \" + PORT));',
                ''
              ].join('\\n');

              fs.writeFileSync(dir + '/api.js', apiCode);
              port++;
            });
          "

      # =========================
      # 🗄 DATABASE LAYER
      # =========================
      - name: Create DB Layer
        run: |
          cat <<'EOF' > db_layer.json
{
  "type": "abstracted",
  "supported_backends": ["supabase", "firebase", "local_json", "sqlite"],
  "tables": {
    "users": {},
    "sessions": {},
    "records": {},
    "logs": {}
  }
}
EOF

      # =========================
      # 🔐 AUTH FRAMEWORK
      # =========================
      - name: Auth System Scaffold
        run: |
          mkdir -p auth

          cat <<'EOF' > auth/auth.js
const users = [];

function login(user) {
  return {
    user,
    session: "session_" + Date.now()
  };
}

function register(user) {
  users.push(user);
  return { status: "registered" };
}

module.exports = { login, register };
EOF

      # =========================
      # 🔌 UPDATE REGISTRY
      # =========================
      - name: Update Integration Registry
        run: |
          node -e "
            const fs = require('fs');
            let memory = JSON.parse(fs.readFileSync('memory.json', 'utf8'));
            memory.integrations = memory.apps.map(a => a + '_api_connected');
            memory.api_links = memory.apps.map(a => '/integrations/' + a);
            memory.auth_enabled = true;
            fs.writeFileSync('memory.json', JSON.stringify(memory, null, 2));
          "

      # =========================
      # 📊 HEALTH CHECK
      # =========================
      - name: Integration Health Check
        run: |
          node -e "
            const fs = require('fs');
            let memory = JSON.parse(fs.readFileSync('memory.json', 'utf8'));
            let score = 50;
            if (memory.auth_enabled) score += 20;
            if (memory.integrations.length > 0) score += 20;
            if (memory.api_links.length > 0) score += 10;
            memory.integration_health = Math.min(100, score);
            fs.writeFileSync('memory.json', JSON.stringify(memory, null, 2));
          "

      # =========================
      # 📦 COMMIT
      # =========================
      - name: Commit V21 Integration Layer
        run: |
          git config user.name "bude-v21"
          git config user.email "v21@bude.tech"
          git add -A
          git commit -m "V21 real-world integration layer" || true
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }} || true
