name: BUDE CEO v27 - Autonomous AI Agent

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - single
          - repair
  push:
    branches: [main, master]
    paths:
      - "brain.py"
      - "bude_memory.json"

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  bude-ceo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bude

      - name: Execute BUDE CEO Brain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          echo "🧠 BUDE CEO v27 Starting..."
          python brain.py
          echo "✅ Brain execution complete"

      - name: Execute Active Agents
        run: |
          if [ -d "agents" ]; then
            for agent_dir in agents/*/; do
              if [ -f "$agent_dir/brain.py" ]; then
                agent_name=$(basename "$agent_dir")
                echo "🤖 Running agent: $agent_name"
                python "$agent_dir/brain.py" || echo "⚠️ Agent $agent_name failed but continuing"
              fi
            done
          fi

      - name: Autonomous Git Commit
        run: |
          git config user.name "BUDE CEO"
          git config user.email "ceo@bude-tech.ai"
          git add -A
          if git diff --quiet && git diff --staged --quiet; then
            echo "📦 No changes to commit"
          else
            git commit -m "🤖 BUDE CEO Cycle $(date -u +%Y-%m-%d_%H:%M)

            - Autonomous operation cycle completed
            - Self-improvement applied
            - Agents evaluated and spawned if needed
            - Dashboard updated with latest data
            - Status updated

            [skip ci]" || echo "Nothing to commit"
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} && git push && break
              echo "Retry $i/3..."
              sleep 5
            done
          fi

      - name: Report Failures
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 BUDE CEO Failure - ${new Date().toISOString()}`;
            const body = `The BUDE CEO autonomous agent encountered an error.
            
            **Workflow:** ${{ github.workflow }}
            **Run ID:** ${{ github.run_id }}
            **Commit:** ${{ github.sha }}
            
            Please check the logs for details.`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'automation']
            });

  deploy-dashboard:
    needs: bude-ceo
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Dashboard for Deploy
        run: |
          mkdir -p public
          if [ -f "dashboard.html" ]; then
            cp dashboard.html public/index.html
          else
            echo '<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BUDE CEO Dashboard</title><style>body{background:#0a0a0f;color:#e0e0ff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;}</style></head><body><div><h1>🤖 BUDE CEO Dashboard</h1><p>Dashboard will appear after first cycle run.</p><p>Check back in a few minutes!</p></div></body></html>' > public/index.html
          fi
          touch public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
