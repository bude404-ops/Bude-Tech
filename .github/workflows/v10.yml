name: BudE V10 Fixed OS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Run AI OS
        run: python brain.py

      - name: Commit fix
        run: |
          git config user.name "bude-v10"
          git config user.email "v10@bude.ai"
          git add .
          git commit -m "V10 fixed OS deploy" || echo "no changes"
          git push
