name: BUDE CEO ENGINE

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  run-ceo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install dotenv

      - run: node brain.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
