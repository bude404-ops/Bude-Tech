name: BudE Evolution
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run BudE
        env: {GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}}
        run: |
          pip install requests
          python3 evolve.py
      - name: Commit
        run: |
          git config user.name "BudE-Bot"
          git config user.email "bot@bude.tech"
          git add . && git commit -m "Evolution Cycle" || echo "No changes"
          git push
