name: Forge Automation
on: [workflow_dispatch]

jobs:
  run-core:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Crucial: Allows the workflow to push changes
    steps:
      - uses: actions/checkout@v4
      - name: Run Auto-Forge
        run: |
          # The logic that creates/verifies files
          python3 index.py grow
          python3 index.py forge
          
          # Git configuration for the bot
          git config --global user.name "Voltann-Ancestor-Core"
          git config --global user.email "core@voltann.bot"
          
          # Commit and Push
          git add .
          git commit -m "Auto-Forge: Ancestor Core self-maintenance"
          git push
