name: BUDE CTO Product Builder v31

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install openai || true

      - name: Run CTO Brain
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node engine/cto.js "$GITHUB_EVENT_PATH"

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "🧠 BUDE CTO Product Build Cycle v31"
          body: "CTO-generated roadmap + execution cycle"
          branch: "cto-${{ github.run_id }}"
          base: main
