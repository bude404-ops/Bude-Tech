name: BUDE Stable Agent v27.1

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install || true

      - name: Show event payload (DEBUG)
        run: cat $GITHUB_EVENT_PATH

      - name: Extract Task
        run: |
          echo "TASK=$(jq -r .issue.title $GITHUB_EVENT_PATH)" >> $GITHUB_ENV

      - name: Verify engine exists
        run: ls -R engine || echo "engine missing"

      - name: Run Agent (verbose mode)
        run: node engine/agent.js "$TASK"

      - name: Upload logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs
          path: agent-log.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "🧠 BUDE Stable Agent v27.1 Output"
          body: |
            Automated agent execution completed.

            📊 Logs attached in artifact
            🧠 Check agent-log.json for reasoning trace
          branch: "stable-agent-${{ github.run_id }}"
          base: main
